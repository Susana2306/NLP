<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistente Visual</title>
  <style>
    :root {
      --primary:      #807E79;
      --primary-dark: #5c5a56;
      --success:      #6e7a52;
      --error:        #a04040;
      --bg:           #f5ede3;
      --surface:      #ffffff;
      --border:       #C8C3BB;
      --text:         #2e2c29;
      --muted:        #807E79;
      --radius:       10px;
      --shadow:       0 2px 12px rgba(0,0,0,.09);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
    }
    a { color: var(--primary); }

    header {
      background: var(--primary);
      color: #fff;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p  { font-size: .9rem; opacity: .85; margin-top: .15rem; }

    main {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 1rem;
    }

    #drop-zone {
      border: 2.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--primary);
      background: #ede8df;
    }
    #drop-zone .icon { font-size: 2.5rem; display: block; margin-bottom: .5rem; }
    #drop-zone p { color: var(--muted); font-size: .95rem; }
    #drop-zone strong { color: var(--primary); cursor: pointer; }
    #file-input { display: none; }

    #file-preview {
      display: none;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
      padding: .75rem 1rem;
      background: #ede8df;
      border-radius: var(--radius);
    }
    #file-preview .file-icon { font-size: 1.6rem; }
    #file-preview .file-name { font-weight: 600; flex: 1; }
    #file-preview .file-size { color: var(--muted); font-size: .85rem; }
    #btn-clear-file {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.1rem; padding: .2rem .4rem;
    }
    #btn-clear-file:hover { color: var(--error); }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 520px) { .settings-grid { grid-template-columns: 1fr; } }

    label { display: block; font-size: .9rem; font-weight: 600; margin-bottom: .35rem; }
    select, input[type="range"] {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .95rem;
      background: var(--surface);
      color: var(--text);
    }
    select:focus, input[type="range"]:focus { outline: 3px solid #BDCED3; }
    .range-row { display: flex; align-items: center; gap: .75rem; }
    .range-row input { flex: 1; }
    .range-val {
      font-weight: 700;
      min-width: 1.5rem;
      text-align: center;
      color: var(--primary);
    }

    #btn-process {
      width: 100%;
      padding: .85rem 1rem;
      background: var(--primary);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }
    #btn-process:hover:not(:disabled) { background: var(--primary-dark); }
    #btn-process:disabled { opacity: .6; cursor: not-allowed; }

    .spinner {
      width: 1.1rem; height: 1.1rem;
      border: 3px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #alert {
      display: none;
      padding: .9rem 1.1rem;
      border-radius: var(--radius);
      font-weight: 600;
    }
    #alert.error   { background: #f5e3e3; color: var(--error);   border: 1px solid #ddb8b8; }
    #alert.success { background: #edf2e0; color: var(--success); border: 1px solid #CFD4AE; }

    #results { display: none; }
    #source-badge {
      display: inline-block;
      background: #ede8df;
      color: var(--primary);
      font-size: .82rem;
      font-weight: 600;
      padding: .2rem .65rem;
      border-radius: 20px;
      margin-bottom: .75rem;
    }

    .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 1.25rem; }
    .tab-btn {
      padding: .65rem 1.2rem;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      font-size: .97rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .content-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.2rem;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .audio-wrap { margin-top: .5rem; }
    .audio-wrap p { font-size: .85rem; color: var(--muted); margin-bottom: .35rem; }
    audio { width: 100%; border-radius: 8px; }

    .entity-group { margin-bottom: .75rem; }
    .entity-header {
      font-weight: 700;
      font-size: .97rem;
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .5rem .75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
    }
    .entity-header:hover { background: #ede8df; }
    .entity-count {
      margin-left: auto;
      background: var(--primary);
      color: #fff;
      font-size: .75rem;
      padding: .1rem .5rem;
      border-radius: 12px;
    }
    .entity-list {
      display: none;
      padding: .6rem .75rem .6rem 2rem;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 8px;
    }
    .entity-list.open { display: block; }
    .entity-list li { margin: .25rem 0; }

    details > summary { list-style: none; }

    .raw-toggle {
      font-size: .85rem;
      color: var(--primary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      margin-bottom: .5rem;
    }
    #raw-box { display: none; }
    #raw-box .content-box { font-size: .85rem; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Asistente Visual</h1>
    <p>Accesibilidad · OCR · NLP · Síntesis de voz</p>
  </div>
</header>

<main>

  <div class="card">
    <h2>1 · Archivo</h2>

    <div id="drop-zone" role="button" aria-label="Área de carga de archivo" tabindex="0">
      <span class="icon">📄</span>
      <p>Arrastra aquí una imagen o PDF<br>o <strong id="browse-link">haz clic para buscar</strong></p>
      <p style="font-size:.8rem;margin-top:.5rem;color:#9e9b95">JPG · PNG · BMP · TIFF · PDF — máx. 20 MB</p>
    </div>
    <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.bmp,.tiff,.pdf" />

    <div id="file-preview">
      <span class="file-icon" id="preview-icon">📄</span>
      <span class="file-name" id="preview-name"></span>
      <span class="file-size" id="preview-size"></span>
      <button id="btn-clear-file" aria-label="Quitar archivo" title="Quitar archivo">✕</button>
    </div>

    <div id="img-preview-wrap" style="display:none;margin-top:1rem;">
      <img id="img-preview" style="max-width:100%;max-height:280px;border-radius:8px;border:1px solid var(--border);" alt="Vista previa de imagen" />
    </div>
  </div>

  <div class="card">
    <h2>2 · Configuración</h2>
    <div class="settings-grid">
      <div>
        <label for="sel-lang">Idioma OCR</label>
        <select id="sel-lang">
          <option value="spa">Español</option>
          <option value="eng">Inglés</option>
        </select>
      </div>
      <div>
        <label for="range-sentences">Oraciones en el resumen</label>
        <div class="range-row">
          <input type="range" id="range-sentences" min="1" max="6" value="3" />
          <span class="range-val" id="range-val">3</span>
        </div>
      </div>
    </div>
  </div>

  <button id="btn-process" disabled>
    <span id="btn-icon">🔍</span>
    <span id="btn-label">Procesar</span>
  </button>

  <div id="alert" role="alert"></div>

  <div id="results" class="card">
    <h2>3 · Resultados</h2>
    <span id="source-badge"></span>

    <div class="tabs" role="tablist">
      <button class="tab-btn active" role="tab" aria-selected="true"  data-tab="tab-text">📝 Texto</button>
      <button class="tab-btn"        role="tab" aria-selected="false" data-tab="tab-ents">🏷️ Entidades</button>
      <button class="tab-btn"        role="tab" aria-selected="false" data-tab="tab-summary">📋 Resumen</button>
    </div>

    <div id="tab-text" class="tab-panel active" role="tabpanel">
      <button class="raw-toggle" id="btn-raw">Mostrar texto sin procesar</button>
      <div id="raw-box">
        <div class="content-box" id="raw-content"></div>
      </div>
      <div class="content-box" id="text-content"></div>
      <div class="audio-wrap">
        <p>🔊 Escuchar texto completo</p>
        <audio id="audio-text" controls></audio>
      </div>
    </div>

    <div id="tab-ents" class="tab-panel" role="tabpanel">
      <div id="entities-container"></div>
      <div class="audio-wrap" id="audio-ents-wrap" style="display:none">
        <p>🔊 Escuchar entidades encontradas</p>
        <audio id="audio-ents" controls></audio>
      </div>
    </div>

    <div id="tab-summary" class="tab-panel" role="tabpanel">
      <div class="content-box" id="summary-content"></div>
      <div class="audio-wrap">
        <p>🔊 Escuchar resumen</p>
        <audio id="audio-summary" controls></audio>
      </div>
    </div>

  </div>

</main>

<script>
  const ENTITY_ICONS = {
    'Persona': '🧑', 'Lugar': '📍', 'Organización': '🏢',
    'Fecha': '📅', 'Hora': '⏰',
  };

  const dropZone     = document.getElementById('drop-zone');
  const fileInput    = document.getElementById('file-input');
  const browseLink   = document.getElementById('browse-link');
  const filePreview  = document.getElementById('file-preview');
  const previewIcon  = document.getElementById('preview-icon');
  const previewName  = document.getElementById('preview-name');
  const previewSize  = document.getElementById('preview-size');
  const btnClear     = document.getElementById('btn-clear-file');
  const imgWrap      = document.getElementById('img-preview-wrap');
  const imgPreview   = document.getElementById('img-preview');
  const btnProcess   = document.getElementById('btn-process');
  const btnLabel     = document.getElementById('btn-label');
  const btnIcon      = document.getElementById('btn-icon');
  const alertBox     = document.getElementById('alert');
  const results      = document.getElementById('results');
  const rangeSent    = document.getElementById('range-sentences');
  const rangeVal     = document.getElementById('range-val');
  const btnRaw       = document.getElementById('btn-raw');
  const rawBox       = document.getElementById('raw-box');

  let selectedFile = null;

  rangeSent.addEventListener('input', () => rangeVal.textContent = rangeSent.value);

  browseLink.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) setFile(f);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  btnClear.addEventListener('click', clearFile);

  function setFile(f) {
    const allowed = ['image/jpeg','image/png','image/bmp','image/tiff','application/pdf'];
    const isPdf   = f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf');
    const isImg   = f.type.startsWith('image/');

    if (!isPdf && !isImg) {
      showAlert('Formato no soportado. Usa JPG, PNG, BMP, TIFF o PDF.', 'error');
      return;
    }
    selectedFile = f;
    previewIcon.textContent = isPdf ? '📄' : '🖼️';
    previewName.textContent = f.name;
    previewSize.textContent = formatBytes(f.size);
    filePreview.style.display = 'flex';

    if (isImg) {
      imgPreview.src = URL.createObjectURL(f);
      imgWrap.style.display = 'block';
    } else {
      imgWrap.style.display = 'none';
    }

    btnProcess.disabled = false;
    hideAlert();
    results.style.display = 'none';
  }

  function clearFile() {
    selectedFile = null;
    fileInput.value = '';
    filePreview.style.display = 'none';
    imgWrap.style.display = 'none';
    btnProcess.disabled = true;
    results.style.display = 'none';
    hideAlert();
  }

  btnProcess.addEventListener('click', async () => {
    if (!selectedFile) return;

    setLoading(true);
    hideAlert();
    results.style.display = 'none';

    const form = new FormData();
    form.append('file', selectedFile);
    form.append('lang', document.getElementById('sel-lang').value);
    form.append('num_sentences', rangeSent.value);

    try {
      const resp = await fetch('/process', { method: 'POST', body: form });
      const data = await resp.json();

      if (!resp.ok) {
        showAlert(data.error || 'Error desconocido.', 'error');
        return;
      }
      renderResults(data);
    } catch (err) {
      showAlert('Error de red al contactar el servidor.', 'error');
    } finally {
      setLoading(false);
    }
  });

  function renderResults(data) {
    document.getElementById('source-badge').textContent = data.source_info;

  
    document.getElementById('raw-content').textContent  = data.raw_text;
    document.getElementById('text-content').textContent = data.cleaned_text;
    setAudio('audio-text', data.audio_text);

    const container = document.getElementById('entities-container');
    container.innerHTML = '';

    if (Object.keys(data.entities).length === 0) {
      container.innerHTML = '<p style="color:var(--muted)">No se detectaron entidades en el texto.</p>';
      document.getElementById('audio-ents-wrap').style.display = 'none';
    } else {
      for (const [cat, items] of Object.entries(data.entities)) {
        const icon = ENTITY_ICONS[cat] || '🔹';
        const group = document.createElement('div');
        group.className = 'entity-group';
        group.innerHTML = `
          <div class="entity-header" tabindex="0" role="button" aria-expanded="false">
            <span>${icon}</span><span>${cat}</span>
            <span class="entity-count">${items.length}</span>
          </div>
          <ul class="entity-list">
            ${items.map(i => `<li>${i}</li>`).join('')}
          </ul>`;
        container.appendChild(group);

        const header = group.querySelector('.entity-header');
        const list   = group.querySelector('.entity-list');
        header.addEventListener('click', () => {
          const open = list.classList.toggle('open');
          header.setAttribute('aria-expanded', open);
        });
        header.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') header.click();
        });
      }
      if (data.audio_entities) {
        setAudio('audio-ents', data.audio_entities);
        document.getElementById('audio-ents-wrap').style.display = 'block';
      }
    }

    document.getElementById('summary-content').textContent = data.summary;
    setAudio('audio-summary', data.audio_summary);

    results.style.display = 'block';
    results.scrollIntoView({ behavior: 'smooth' });

    activateTab('tab-text');
  }

  let rawVisible = false;
  btnRaw.addEventListener('click', () => {
    rawVisible = !rawVisible;
    rawBox.style.display = rawVisible ? 'block' : 'none';
    btnRaw.textContent = rawVisible ? 'Ocultar texto sin procesar' : 'Mostrar texto sin procesar';
  });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => activateTab(btn.dataset.tab));
  });

  function activateTab(id) {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === id);
      b.setAttribute('aria-selected', b.dataset.tab === id);
    });
    document.querySelectorAll('.tab-panel').forEach(p => {
      p.classList.toggle('active', p.id === id);
    });
  }

  function setAudio(id, b64) {
    document.getElementById(id).src = 'data:audio/mp3;base64,' + b64;
  }

  function setLoading(loading) {
    btnProcess.disabled = loading;
    btnIcon.textContent  = loading ? '' : '🔍';
    btnLabel.textContent = loading ? 'Procesando…' : 'Procesar';
    if (loading) {
      const spin = document.createElement('span');
      spin.className = 'spinner';
      spin.id = 'spin';
      btnIcon.replaceWith(spin);
    } else {
      document.getElementById('spin')?.replaceWith(btnIcon);
    }
  }

  function showAlert(msg, type) {
    alertBox.textContent = msg;
    alertBox.className = type;
    alertBox.style.display = 'block';
  }

  function hideAlert() {
    alertBox.style.display = 'none';
    alertBox.className = '';
  }

  function formatBytes(b) {
    if (b < 1024)      return b + ' B';
    if (b < 1048576)   return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }
</script>
</body>
</html>
